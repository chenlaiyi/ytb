<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a68ff" />
      <stop offset="55%" stop-color="#4f8cff" />
      <stop offset="100%" stop-color="#8ab4ff" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#f2f6ff" stop-opacity="0.96" />
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-10%" width="116%" height="130%">
      <feOffset dy="28" input="SourceAlpha" />
      <feGaussianBlur stdDeviation="36" />
      <feComposite in2="SourceAlpha" operator="out" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.11 0 0 0 0 0.29 0 0 0 0 0.75 0 0 0 0.18 0" />
      <feBlend in="SourceGraphic" />
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="url(#bgGradient)" />
  <g transform="translate(120, 200)">
    <text x="0" y="0" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="80" font-weight="600" fill="#ffffff">点点够支付机构</text>
    <text x="0" y="110" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="66" font-weight="500" fill="#ffffff">一站式数字化业务增长中心</text>
  </g>
  <g transform="translate(100, 420)">
    <rect width="880" height="620" rx="48" fill="url(#cardGradient)" filter="url(#cardShadow)" />
    <text x="72" y="140" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#1a2d5a">机构专享权益</text>
    <g fill="#4054b2" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40">
      <text x="72" y="240">• 专属运营顾问，全流程陪跑</text>
      <text x="72" y="320">• 一键开通入驻，极速发卡</text>
      <text x="72" y="400">• 智能分润中心，收益实时结算</text>
      <text x="72" y="480">• 多行业解决方案，快速复制</text>
    </g>
    <g transform="translate(620, 160)">
      <circle cx="120" cy="120" r="120" fill="#f3f7ff" />
      <path d="M120 40c44 0 80 36 80 80s-36 80-80 80-80-36-80-80 36-80 80-80z" fill="#5b7ded" />
      <path d="M120 74c-24 0-44 20-44 44 0 20 12 36 30 42v40l14-8 14 8v-40c18-6 30-22 30-42 0-24-20-44-44-44z" fill="#ffffff" />
    </g>
  </g>
  <g transform="translate(100, 1100)">
    <rect width="880" height="540" rx="48" fill="url(#cardGradient)" filter="url(#cardShadow)" />
    <text x="72" y="150" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#1a2d5a">核心亮点</text>
    <g fill="#4054b2" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40">
      <text x="72" y="240">• 支持微信/支付宝/银联收款</text>
      <text x="72" y="320">• 集成商户、设备、结算全流程</text>
      <text x="72" y="400">• 支持多层渠道分销与绩效统计</text>
      <text x="72" y="480">• 合规风控，数据看板实时更新</text>
    </g>
    <g transform="translate(600, 140)">
      <rect x="0" y="0" width="220" height="220" rx="32" fill="#e5edff" />
      <path d="M60 160l44-56 32 36 40-52 44 72H60z" fill="#4b72ff" />
      <circle cx="60" cy="70" r="20" fill="#4b72ff" opacity="0.6" />
      <circle cx="160" cy="60" r="18" fill="#4b72ff" opacity="0.35" />
    </g>
  </g>
  <g transform="translate(120, 1760)">
    <rect width="840" height="100" rx="50" fill="#0f337f" opacity="0.85" />
    <text x="80" y="68" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="46" font-weight="600" fill="#ffffff">长按识别，加入点点够全国机构合伙人</text>
  </g>
