<!DOCTYPE html><html><head><title>登录状态检查</title></head><body><h1>登录状态检查</h1><script>const token = localStorage.getItem("token"); const userInfo = localStorage.getItem("userInfo"); document.body.innerHTML += "<p>Token: " + (token ? token.substring(0, 20) + "..." : "无") + "</p>"; document.body.innerHTML += "<p>用户信息: " + (userInfo ? "有" : "无") + "</p>"; if (userInfo) { const user = JSON.parse(userInfo); document.body.innerHTML += "<p>用户ID: " + (user.id || "无") + "</p>"; document.body.innerHTML += "<p>用户名: " + (user.name || user.wechat_nickname || "无") + "</p>"; document.body.innerHTML += "<p>VIP状态: " + (user.is_vip ? "是" : "否") + "</p>"; }</script></body></html>
