    <!-- 移动兼容性处理 -->
    <script>
      // 移动设备适配
      (function() {
        // 判断是否需要添加meta标签
        var ua = navigator.userAgent;
        var isIOS = /(iPhone|iPad|iPod)/i.test(ua);
        var isAndroid = /Android/i.test(ua);
        var isWeixin = /MicroMessenger/i.test(ua);

        // 微信内置浏览器的适配
        if (isWeixin) {
          // 检测是否是iPhone X或以上的设备
          if (isIOS && (window.screen.height >= 812 && window.screen.width >= 375)) {
            document.documentElement.classList.add('safe-area');
          }
        }

        // 防止页面缩放
        document.addEventListener('touchstart', function(event) {
          if (event.touches.length > 1) {
            event.preventDefault();
          }
        }, { passive: false });

        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
          var now = (new Date()).getTime();
          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        }, false);
      })();
    </script>
    <script>
      (function () {
        // 获取全局对象
        var w = typeof window !== 'undefined' ? window : {};
        var g = typeof globalThis !== 'undefined' ? globalThis : w;

        // 确保 globalThis 存在
        if (typeof globalThis === 'undefined') {
          try {
            Object.defineProperty(Object.prototype, '__getGlobal__', {
              get: function() { return this; },
              configurable: true
            });
            var globalObj = __getGlobal__;
            delete Object.prototype.__getGlobal__;
            if (typeof globalObj.globalThis === 'undefined') globalObj.globalThis = globalObj;
            if (typeof globalObj.global === 'undefined') globalObj.global = globalObj;
            g = globalObj;
            w = globalObj;
          } catch(e) {}
        }

        // 确保 window 和 global 存在
        if (typeof w.window === 'undefined') w.window = w;
        if (typeof w.global === 'undefined') w.global = w;
        if (typeof w.globalThis === 'undefined') w.globalThis = w;
        if (typeof g.global === 'undefined') g.global = g;
        if (typeof g.globalThis === 'undefined') g.globalThis = g;

        // 确保 Request 构造器存在
        if (typeof g.Request === 'undefined' && typeof w.Request === 'undefined') {
          w.Request = g.Request = function Request(input, init) {
            this.url = typeof input === 'string' ? input : (input && input.url) || '';
            this.method = (init && init.method) || (input && input.method) || 'GET';
            this.headers = (init && init.headers) || (input && input.headers) || {};
            this.body = (init && init.body) || (input && input.body) || null;
            this.credentials = (init && init.credentials) || (input && input.credentials) || 'same-origin';
          };
          w.Request.prototype = g.Request.prototype = {};
        }

        // 确保 Response 构造器存在
        if (typeof g.Response === 'undefined' && typeof w.Response === 'undefined') {
          w.Response = g.Response = function Response(body, init) {
            this.body = body;
            this.status = (init && init.status) || 200;
            this.statusText = (init && init.statusText) || 'OK';
            this.ok = this.status >= 200 && this.status < 300;
            this.headers = new w.Headers ? new w.Headers(init && init.headers) : {};
            this.url = (init && init.url) || '';
          };
          w.Response.prototype = g.Response.prototype = {};
        }

        // 确保 Headers 构造器存在
        if (typeof g.Headers === 'undefined' && typeof w.Headers === 'undefined') {
          w.Headers = g.Headers = function Headers(init) {
            this._map = {};
            if (init) {
              if (init instanceof w.Headers || typeof init === 'object') {
                var entries = init instanceof w.Headers ? Array.from(init.entries()) : Object.entries(init);
                entries.forEach(function(entry) {
                  this._map[entry[0].toLowerCase()] = entry[1];
                }, this);
              }
            }
          };
          w.Headers.prototype = g.Headers.prototype = {
            entries: function* entries() {
              for (var key in this._map) {
                if (Object.prototype.hasOwnProperty.call(this._map, key)) {
                  yield [key, this._map[key]];
                }
              }
            },
            forEach: function(callback, thisArg) {
              for (var key in this._map) {
                if (Object.prototype.hasOwnProperty.call(this._map, key)) {
                  callback.call(thisArg, this._map[key], key, this);
                }
              }
            },
            get: function(key) { return this._map[key.toLowerCase()] || null; },
            has: function(key) { return key.toLowerCase() in this._map; }
          };
        }

        // 确保 fetch 存在
        if (typeof g.fetch === 'undefined' && typeof w.fetch === 'undefined') {
          w.fetch = g.fetch = function fetch(input, init) {
            return new Promise(function(resolve, reject) {
              var url = typeof input === 'string' ? input : (input && input.url) || '';
              var method = (init && init.method) || (input && input.method) || 'GET';

              var xhr = new XMLHttpRequest();
              xhr.open(method, url, true);

              if (init && init.headers) {
                if (init.headers instanceof w.Headers) {
                  init.headers.forEach(function(value, key) {
                    xhr.setRequestHeader(key, value);
                  });
                } else if (typeof init.headers === 'object') {
                  Object.keys(init.headers).forEach(function(key) {
                    xhr.setRequestHeader(key, init.headers[key]);
                  });
                }
              }

              xhr.withCredentials = init && init.credentials === 'include';

              xhr.onload = function() {
                var resp = new w.Response(xhr.responseText, {
                  status: xhr.status,
                  statusText: xhr.statusText,
                  headers: {}
                });
                resolve(resp);
              };

              xhr.onerror = function() { reject(new TypeError('Network request failed')); };
              xhr.ontimeout = function() { reject(new TypeError('Network request timed out')); };

              xhr.send(init && init.body || null);
            });
          };
        }

        // 确保 FormData 存在
        if (typeof w.FormData === 'undefined') {
          w.FormData = function FormData() { this._data = []; };
          w.FormData.prototype.append = function(k, v) { this._data.push({key: k, value: v}); };
        }
        if (typeof g.FormData === 'undefined') g.FormData = w.FormData;

        console.log('Polyfills initialized');
      })();
    </script>

    <!-- 错误处理和重定向脚本 -->
    <script>
      // 处理微信授权回调错误
      (function() {
        // 检查URL是否包含微信授权回调参数
        var urlParams = new URLSearchParams(window.location.search);
        var code = urlParams.get('code');
        var state = urlParams.get('state');

        if (code && state) {
          // 如果在开发目录中
          if (window.location.pathname.includes('/Tapp/app-vue/')) {
            var redirectUrl = '/app/#/wechat-callback?code=' + code + '&state=' + state;
            console.log('检测到开发环境下的微信回调，重定向到:', redirectUrl);
            window.location.href = redirectUrl;
          }
        }

        // 监听模块加载错误
        window.addEventListener('error', function(event) {
          if (event.message && event.message.includes('Failed to resolve module specifier')) {
            console.error('模块解析错误:', event.message);
            // 在微信回调场景下
            if (code && state) {
              var redirectUrl = '/app/#/wechat-callback?code=' + code + '&state=' + state;
              console.log('检测到模块加载错误，重定向到:', redirectUrl);
              window.location.href = redirectUrl;
            }
          }
        }, true);
      })();
    </script>

    <!-- 添加兼容性代码 -->
    <script>
      // 移动端适配
      document.addEventListener('DOMContentLoaded', function() {
        // 处理iOS底部导航适配
        if (/iphone|ipod|ipad/i.test(navigator.userAgent)) {
          document.documentElement.classList.add('ios');
        }

        // 添加全局点击处理
        document.addEventListener('click', function(e) {
          const tabbarItem = e.target.closest('.van-tabbar-item');
          if (tabbarItem) {
            // 模拟点击事件
            const href = tabbarItem.getAttribute('href');
            if (href) {
              window.location.href = href;
            }
          }
        });
      });
    </script>
    <!-- 全局错误捕获 -->
    <script>
      // 捕获全局未处理的错误
      window.addEventListener('error', function(event) {
        // 过滤掉常见的非关键错误，避免误报
        var message = event.message || '';
        var filename = event.filename || '';
        
        // 忽略外部资源加载失败（如微信SDK）
        if (filename.includes('res.wx.qq.com') || 
            message.includes('res.wx.qq.com') ||
            message.includes('Script error') ||
            message.includes('Network Error') ||
            message.includes('Loading CSS chunk')) {
          console.warn('忽略外部资源错误:', message);
          return;
        }
        
        // 忽略分支机构相关的token错误，这些已经有专门处理
        if (message.includes('无效的令牌') || 
            message.includes('token') ||
            window.location.hash.includes('/branch')) {
          console.warn('忽略分支机构token相关错误:', message);
          return;
        }

        // 记录其他错误信息
        console.error('全局错误:', message, filename, 'line:', event.lineno, 'col:', event.colno);

        // 特别关注与微信支付相关的错误
        if (filename && (filename.includes('index-') || filename.includes('app.js'))) {
          console.error('可能的应用程序错误:', event);

          // 如果错误与微信支付有关
          if (message && (
              message.includes('WeixinJSBridge') ||
              message.includes('getBrandWCPayRequest') ||
              message.includes('pay')
          )) {
            console.error('检测到微信支付相关错误');
            // 记录用户环境信息以便排查
            console.info('用户浏览器:', navigator.userAgent);
            console.info('页面URL:', window.location.href);
          }
        }
      });

      // 捕获Promise未处理的rejected错误
      window.addEventListener('unhandledrejection', function(event) {
        console.error('未处理的Promise错误:', event.reason);
      });
    </script>
    <!-- 添加微信JS SDK支持 - 本地化版本 -->
    <script>
      if (/MicroMessenger/i.test(navigator.userAgent)) {
        // 使用本地微信JS SDK，避免外网依赖
        if (location.hostname === 'pay.itapgo.com') {
          document.write('<script src="/app/js/jweixin-1.6.0.js"><\/script>');
        } else {
          // 开发环境或其他环境，尝试加载官方版本，但添加超时保护
          var script = document.createElement('script');
          script.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
          script.async = true;
          script.timeout = 3000; // 3秒超时
          
          // 超时处理
          var timeoutId = setTimeout(function() {
            console.warn('微信JS SDK加载超时，使用fallback处理');
            // 创建一个简化的wx对象，避免报错
            if (typeof wx === 'undefined') {
              window.wx = {
                config: function() {},
                ready: function(callback) { 
                  setTimeout(callback, 100); 
                },
                error: function() {},
                chooseWXPay: function() {
                  console.warn('微信支付功能不可用');
                }
              };
            }
          }, 3000);
          
          script.onload = function() {
            clearTimeout(timeoutId);
            console.log('微信JS SDK加载成功');
          };
          
          script.onerror = function() {
            clearTimeout(timeoutId);
            console.warn('微信JS SDK加载失败，使用fallback处理');
            // 创建fallback wx对象
            if (typeof wx === 'undefined') {
              window.wx = {
                config: function() {},
                ready: function(callback) { 
                  setTimeout(callback, 100); 
                },
                error: function() {},
                chooseWXPay: function() {
                  console.warn('微信支付功能不可用');
                }
              };
            }
          };
          
          document.head.appendChild(script);
        }
      }
    </script>

    <!-- 微信支付桥接初始化 -->
    <script>
      // 在页面加载完成后检查WeixinJSBridge
      document.addEventListener('DOMContentLoaded', function() {
        // 在微信环境中才执行
        if (/MicroMessenger/i.test(navigator.userAgent)) {
          console.log('微信环境检测，准备WeixinJSBridge');

          // 注册WeixinJSBridgeReady事件
          if (typeof WeixinJSBridge === 'undefined') {
            console.log('WeixinJSBridge未定义，注册ready事件');

            function onBridgeReady() {
              console.log('WeixinJSBridge已初始化');
              // 将WeixinJSBridge挂载到window对象以确保可用
              window.WeixinJSBridge = WeixinJSBridge;
            }

            if (document.addEventListener) {
              document.addEventListener('WeixinJSBridgeReady', onBridgeReady, false);
            } else if (document.attachEvent) {
              document.attachEvent('WeixinJSBridgeReady', onBridgeReady);
              document.attachEvent('onWeixinJSBridgeReady', onBridgeReady);
            }
          } else {
            console.log('WeixinJSBridge已存在');
            // 确保挂载到window对象
            window.WeixinJSBridge = WeixinJSBridge;
          }
        }
      });
    </script>
