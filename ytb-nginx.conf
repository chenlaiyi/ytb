server {
    listen 80;
    listen 443 ssl http2;
    server_name ytb.ddg.org.cn www.ytb.ddg.org.cn;
    
    root /www/wwwroot/ytb.ddg.org.cn/ytb-frontend/public;
    index index.php index.html;
    
    ssl_certificate /www/server/panel/vhost/cert/ytb.ddg.org.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/ytb.ddg.org.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # 前端 Vue SPA
    location / {
        try_files $uri $uri/index.html /index.html;
    }
    
    # 独立后端 API
    location /api/ {
        try_files $uri /../ytb-backend/public/api.php?$query_string;
    }
    
    # PHP 处理 API 请求
    location ~ ^/api/(.+)$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /www/wwwroot/ytb.ddg.org.cn/ytb-backend/public/api.php;
        fastcgi_param REQUEST_URI /api/$1;
        fastcgi_param PATH_INFO /api/$1;
    }
    
    access_log /www/wwwlogs/ytb.ddg.org.cn.log;
    error_log /www/wwwlogs/ytb.ddg.org.cn.error.log;
}