server {
    listen 80;
    listen 443 ssl http2;
    server_name ytb.ddg.org.cn www.ytb.ddg.org.cn;
    
    root /www/wwwroot/ytb.ddg.org.cn;
    index index.php index.html;
    
    ssl_certificate /www/server/panel/vhost/cert/ytb.ddg.org.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/ytb.ddg.org.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # 前端路由
    location /admin/ {
        try_files $uri $uri/index.html /admin/index.html;
    }
    
    # API 请求重写到对应的 PHP 文件
    # /api/admin/v1/users -> /api/admin/v1/users.php
    # /api/admin/v1/users/123 -> /api/admin/v1/users.php (with _path=users/123)
    location ~ ^/api/admin/v1/(users|commissions|upgrades|statistics|dashboard|configs|menus|auth)$ {
        rewrite ^/api/admin/v1/([a-z]+)$ /api/admin/v1/$1.php last;
    }
    
    location ~ ^/api/admin/v1/(users|commissions|upgrades|statistics|dashboard|configs|menus|auth)/ {
        rewrite ^/api/admin/v1/([a-z]+)/(.*)$ /api/admin/v1/$1.php?_path=$1/$2 last;
    }
    
    # API PHP 文件处理
    location ~ ^/api/admin/v1/[a-z]+\.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # Admin API PHP 处理 (其他 admin/api 请求)
    location ~ ^/admin/api/.*\.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # 其他 API 请求代理到 api.php
    location /api/ {
        rewrite ^/api/(.*) /api.php?_path=$1$is_args$args? last;
    }
    
    # api.php 处理
    location = /api.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    access_log /www/wwwlogs/ytb.ddg.org.cn.log;
    error_log /www/wwwlogs/ytb.ddg.org.cn.error.log;
}
