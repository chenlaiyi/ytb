server {
    listen 80;
    listen 443 ssl http2;
    server_name ytb.ddg.org.cn www.ytb.ddg.org.cn;

    root /www/wwwroot/ytb.ddg.org.cn;
    index index.php index.html;

    ssl_certificate /www/server/panel/vhost/cert/ytb.ddg.org.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/ytb.ddg.org.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 前端路由
    location /admin/ {
        try_files $uri $uri/index.html /index.html;
    }

    # H5 App 路由 (Vue SPA)
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # H5 静态资源
    location /app/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # H5 public 资源 (js, css等)
    location /app/js/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /app/css/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin 静态资源 - alias 到根目录的 assets
    location /admin/assets/ {
        alias /www/wwwroot/ytb.ddg.org.cn/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 所有 /api/ 请求走 api.php
    location /api/ {
        rewrite ^/api/(.*)$ /api.php?_path=$1? last;
    }

    # Tapp 旧API路径也走 api.php (兼容 vip_list.php 等) - 使用 regex 确保优先匹配
    location ~ ^/Tapp/admin/api/ {
        rewrite ^/Tapp/admin/api/(.*)$ /api.php?_path=Tapp/admin/api/$1? last;
    }

    # api.php 处理
    location ~ ^/api\.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # PHP 文件处理 - 但排除 /Tapp/ 路径
    location ~ ^(?!\/Tapp\/).*\.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 前端 Vue SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/ytb.ddg.org.cn.log;
    error_log /www/wwwlogs/ytb.ddg.org.cn.error.log;
}
