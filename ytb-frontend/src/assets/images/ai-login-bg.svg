<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#f5576c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    
    <!-- 神经网络节点渐变 -->
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#00d4ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- 粒子渐变 -->
    <radialGradient id="particleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <!-- 光晕效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <!-- 动画定义 -->
    <animateTransform id="rotate" attributeName="transform" type="rotate" values="0 960 540;360 960 540" dur="60s" repeatCount="indefinite"/>
    <animateTransform id="pulse" attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
  </defs>
  
  <!-- 主背景 -->
  <rect width="1920" height="1080" fill="url(#mainGradient)"/>
  
  <!-- 动态几何图形层 -->
  <g opacity="0.1">
    <!-- 大圆环 -->
    <circle cx="300" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" values="0 300 200;360 300 200" dur="30s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 六边形 -->
    <polygon points="1600,300 1700,250 1800,300 1800,400 1700,450 1600,400" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" values="0 1700 350;-360 1700 350" dur="45s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- 三角形 -->
    <polygon points="200,800 300,700 400,800" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" values="0 300 750;360 300 750" dur="25s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- AI神经网络可视化 -->
  <g opacity="0.6">
    <!-- 神经网络节点 -->
    <circle cx="150" cy="150" r="8" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="100" r="6" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="250" cy="250" r="10" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="450" cy="200" r="7" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    
    <!-- 连接线 -->
    <line x1="150" y1="150" x2="350" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="150" x2="250" y2="250" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="350" y1="100" x2="450" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="250" y1="250" x2="450" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </line>
  </g>
  
  <!-- 右侧神经网络 -->
  <g opacity="0.5">
    <circle cx="1500" cy="800" r="9" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1650" cy="750" r="7" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="1600" cy="900" r="8" fill="url(#nodeGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4.2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    
    <line x1="1500" y1="800" x2="1650" y2="750" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="1500" y1="800" x2="1600" y2="900" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
    </line>
  </g>
  
  <!-- 浮动粒子效果 -->
  <g opacity="0.7">
    <!-- 粒子1 -->
    <circle cx="100" cy="500" r="3" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="translate" values="0,0;50,-30;0,0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 粒子2 -->
    <circle cx="1800" cy="300" r="4" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-40,60;0,0" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 粒子3 -->
    <circle cx="800" cy="100" r="2" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="translate" values="0,0;30,80;0,0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 粒子4 -->
    <circle cx="1200" cy="950" r="3" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-60,-40;0,0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 数据流效果 -->
  <g opacity="0.4">
    <!-- 数据流线1 -->
    <path d="M 0,400 Q 200,350 400,400 T 800,400" fill="none" stroke="#00ff88" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="5s" repeatCount="indefinite"/>
    </path>
    
    <!-- 数据流线2 -->
    <path d="M 1920,600 Q 1700,650 1500,600 T 1100,600" fill="none" stroke="#ff6b6b" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="6s" repeatCount="indefinite" begin="1s"/>
    </path>
    
    <!-- 数据流线3 -->
    <path d="M 600,0 Q 650,200 600,400 T 600,800" fill="none" stroke="#4ecdc4" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="7s" repeatCount="indefinite" begin="2s"/>
    </path>
  </g>
  
  <!-- 光效装饰 -->
  <g opacity="0.3">
    <!-- 光环1 -->
    <circle cx="960" cy="200" r="100" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2">
      <animate attributeName="r" values="100;120;100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 光环2 -->
    <circle cx="960" cy="200" r="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="80;100;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 底部装饰波浪 -->
  <g opacity="0.2">
    <path d="M 0,1000 Q 480,950 960,1000 T 1920,1000 L 1920,1080 L 0,1080 Z" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="-960,0;0,0;-960,0" dur="20s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 顶部装饰 -->
  <g opacity="0.15">
    <path d="M 0,0 L 1920,0 L 1920,100 Q 1440,150 960,100 T 0,100 Z" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="0,0;960,0;0,0" dur="25s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>