<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亿拓宝管理后台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 400px; }
        .login-title { text-align: center; margin-bottom: 30px; font-size: 20px; font-weight: 600; color: #303133; }
        .dashboard { min-height: 100vh; background: #f5f7fa; }
        .header { background: #fff; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header-title { font-size: 18px; font-weight: 600; color: #303133; }
        .header-user { display: flex; align-items: center; gap: 12px; }
        .content { padding: 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .card-icon { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px; }
        .card-icon.blue { background: #ecf5ff; color: #409eff; }
        .card-icon.green { background: #f0f9eb; color: #67c23a; }
        .card-icon.orange { background: #fef0e6; color: #e6a23c; }
        .card-icon.red { background: #fef0f0; color: #f56c6c; }
        .card-title { color: #909399; font-size: 14px; margin-bottom: 8px; }
        .card-value { color: #303133; font-size: 28px; font-weight: 600; }
        .welcome { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); text-align: center; }
        .welcome h2 { color: #303133; margin-bottom: 12px; }
        .welcome p { color: #909399; }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
    const { createApp, ref, computed, onMounted } = Vue;
    const { ElMessage } = ElementPlus;
    
    // Axios 配置
    axios.defaults.baseURL = '/api';
    axios.defaults.headers.common['X-Site-Domain'] = 'ytb.ddg.org.cn';
    
    // API
    const api = {
        login(username, password) {
            return axios.post('/admin/v1/auth/login', { username, password });
        },
        logout() {
            return axios.post('/admin/v1/auth/logout');
        },
        getUser() {
            return axios.get('/admin/v1/auth/me');
        },
        getMenus() {
            return axios.get('/admin/v1/menus');
        },
        getDashboard() {
            return axios.get('/admin/v1/dashboard/cockpit');
        },
        getNotifications() {
            return axios.get('/admin/v1/notifications/unread-count');
        }
    };
    
    // 存储
    const store = {
        token: localStorage.getItem('ytb_token'),
        user: JSON.parse(localStorage.getItem('ytb_user') || 'null'),
        setToken(token) {
            this.token = token;
            localStorage.setItem('ytb_token', token);
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        },
        setUser(user) {
            this.user = user;
            localStorage.setItem('ytb_user', JSON.stringify(user));
        },
        clear() {
            this.token = null;
            this.user = null;
            localStorage.removeItem('ytb_token');
            localStorage.removeItem('ytb_user');
            delete axios.defaults.headers.common['Authorization'];
        }
    };
    
    if (store.token) {
        axios.defaults.headers.common['Authorization'] = `Bearer ${store.token}`;
    }
    
    // 登录
    const Login = {
        template: `
            <div class="login-container">
                <div class="login-box">
                    <h1 class="login-title">亿拓宝管理后台</h1>
                    <el-form @submit.prevent="handleLogin">
                        <el-form-item>
                            <el-input v-model="username" placeholder="用户名" size="large" />
                        </el-form-item>
                        <el-form-item>
                            <el-input v-model="password" type="password" placeholder="密码" size="large" />
                        </el-form-item>
                        <el-form-item>
                            <el-button type="primary" size="large" style="width:100%" :loading="loading" @click="handleLogin">
                                {{ loading ? '登录中...' : '登录' }}
                            </el-button>
                        </el-form-item>
                    </el-form>
                    <div v-if="error" style="color:#f56c6c;text-align:center;margin-top:10px">{{ error }}</div>
                </div>
            </div>
        `,
        setup() {
            const username = ref('');
            const password = ref('');
            const loading = ref(false);
            const error = ref('');
            
            const handleLogin = async () => {
                loading.value = true;
                error.value = '';
                try {
                    const res = await api.login(username.value, password.value);
                    if (res.data.code === 0) {
                        store.setToken(res.data.data.token);
                        store.setUser(res.data.data.user);
                        ElMessage.success('登录成功');
                        window.location.reload();
                    } else {
                        error.value = res.data.message || '登录失败';
                    }
                } catch (e) {
                    error.value = e.response?.data?.message || '网络错误';
                } finally {
                    loading.value = false;
                }
            };
            
            return { username, password, loading, error, handleLogin };
        }
    };
    
    // 仪表盘
    const Dashboard = {
        template: `
            <div class="dashboard">
                <div class="header">
                    <div class="header-title">亿拓宝管理后台</div>
                    <div class="header-user">
                        <el-avatar :size="36" style="background:#667eea">
                            {{ user?.name?.charAt(0) || '?' }}
                        </el-avatar>
                        <span>{{ user?.name }}</span>
                        <el-button type="danger" size="small" @click="handleLogout">退出</el-button>
                    </div>
                </div>
                <div class="content">
                    <div class="cards">
                        <div class="card">
                            <div class="card-icon blue">👥</div>
                            <div class="card-title">总用户数</div>
                            <div class="card-value">{{ stats.total_users || 0 }}</div>
                        </div>
                        <div class="card">
                            <div class="card-icon green">📈</div>
                            <div class="card-title">今日新增</div>
                            <div class="card-value">{{ stats.today_users || 0 }}</div>
                        </div>
                        <div class="card">
                            <div class="card-icon orange">💰</div>
                            <div class="card-title">总订单数</div>
                            <div class="card-value">{{ stats.total_orders || 0 }}</div>
                        </div>
                        <div class="card">
                            <div class="card-icon red">🎉</div>
                            <div class="card-title">今日订单</div>
                            <div class="card-value">{{ stats.today_orders || 0 }}</div>
                        </div>
                    </div>
                    <div class="welcome">
                        <h2>欢迎使用亿拓宝管理后台</h2>
                        <p>当前版本：v1.0.0</p>
                    </div>
                </div>
            </div>
        `,
        setup() {
            const user = ref(store.user);
            const stats = ref({});
            
            const loadData = async () => {
                try {
                    const res = await api.getDashboard();
                    if (res.data.code === 0) {
                        stats.value = res.data.data;
                    }
                } catch (e) {
                    console.error('加载数据失败', e);
                }
            };
            
            const handleLogout = async () => {
                try {
                    await api.logout();
                } catch (e) {}
                store.clear();
                ElMessage.success('已退出');
                window.location.reload();
            };
            
            onMounted(() => {
                loadData();
            });
            
            return { user, stats, handleLogout };
        }
    };
    
    // App
    const App = {
        template: `<Login v-if="!isLoggedIn" /><Dashboard v-else />`,
        setup() {
            const isLoggedIn = ref(!!store.token);
            return { isLoggedIn };
        }
    };
    
    createApp(App).component('Login', Login).component('Dashboard', Dashboard).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
