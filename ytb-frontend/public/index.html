<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亿拓宝管理后台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 400px; }
        .login-title { text-align: center; margin-bottom: 30px; color: #333; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #f56c6c; font-size: 14px; margin-top: 10px; text-align: center; }
        
        .dashboard-container { min-height: 100vh; background: #f5f7fa; }
        .header { background: white; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header-title { font-size: 18px; font-weight: 600; color: #333; }
        .header-user { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
        .header-name { color: #333; }
        .logout-btn { padding: 8px 16px; background: #f56c6c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .content { padding: 24px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-title { color: #909399; font-size: 14px; margin-bottom: 12px; }
        .card-value { color: #303133; font-size: 28px; font-weight: 600; }
        .card-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; margin-bottom: 16px; }
        
        .welcome-section { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; }
        .welcome-title { font-size: 24px; color: #333; margin-bottom: 12px; }
        .welcome-subtitle { color: #909399; }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
    const { createApp, ref, computed, onMounted } = Vue;
    
    // Axios 配置
    axios.defaults.baseURL = '/api';
    axios.defaults.headers.common['X-Site-Domain'] = 'ytb.ddg.org.cn';
    
    // API 请求封装
    const api = {
        login(username, password) {
            return axios.post('/admin/v1/auth/login', { username, password });
        },
        logout() {
            return axios.post('/admin/v1/auth/logout');
        },
        getUser() {
            return axios.get('/admin/v1/auth/me');
        },
        getMenus() {
            return axios.get('/admin/v1/menus');
        },
        getDashboard() {
            return axios.get('/admin/v1/dashboard/cockpit');
        },
        getNotifications() {
            return axios.get('/admin/v1/notifications/unread-count');
        }
    };
    
    // 存储
    const store = {
        token: localStorage.getItem('ytb_token'),
        user: JSON.parse(localStorage.getItem('ytb_user') || 'null'),
        setToken(token) {
            this.token = token;
            localStorage.setItem('ytb_token', token);
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        },
        setUser(user) {
            this.user = user;
            localStorage.setItem('ytb_user', JSON.stringify(user));
        },
        clear() {
            this.token = null;
            this.user = null;
            localStorage.removeItem('ytb_token');
            localStorage.removeItem('ytb_user');
            delete axios.defaults.headers.common['Authorization'];
        }
    };
    
    if (store.token) {
        axios.defaults.headers.common['Authorization'] = `Bearer ${store.token}`;
    }
    
    // 登录组件
    const Login = {
        template: `
            <div class="login-container">
                <div class="login-box">
                    <h1 class="login-title">亿拓宝管理后台</h1>
                    <form @submit.prevent="handleLogin">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" v-model="username" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" v-model="password" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="login-btn" :disabled="loading">
                            {{ loading ? '登录中...' : '登录' }}
                        </button>
                        <p v-if="error" class="error-msg">{{ error }}</p>
                    </form>
                </div>
            </div>
        `,
        setup() {
            const username = ref('');
            const password = ref('');
            const loading = ref(false);
            const error = ref('');
            
            const handleLogin = async () => {
                loading.value = true;
                error.value = '';
                try {
                    const res = await api.login(username.value, password.value);
                    if (res.data.code === 0) {
                        store.setToken(res.data.data.token);
                        store.setUser(res.data.data.user);
                        window.location.reload();
                    } else {
                        error.value = res.data.message || '登录失败';
                    }
                } catch (e) {
                    error.value = e.response?.data?.message || '网络错误';
                } finally {
                    loading.value = false;
                }
            };
            
            return { username, password, loading, error, handleLogin };
        }
    };
    
    // 仪表盘组件
    const Dashboard = {
        template: `
            <div class="dashboard-container">
                <header class="header">
                    <div class="header-title">亿拓宝管理后台</div>
                    <div class="header-user">
                        <div class="header-avatar">{{ userAvatar }}</div>
                        <span class="header-name">{{ user?.name }}</span>
                        <button class="logout-btn" @click="handleLogout">退出</button>
                    </div>
                </header>
                <div class="content">
                    <div class="cards">
                        <div class="card">
                            <div class="card-icon">👥</div>
                            <div class="card-title">总用户数</div>
                            <div class="card-value">{{ stats.total_users || 0 }}</div>
                        </div>
                        <div class="card">
                            <div class="card-icon">📈</div>
                            <div class="card-title">今日新增</div>
                            <div class="card-value">{{ stats.today_users || 0 }}</div>
                        </div>
                        <div class="card">
                            <div class="card-icon">💰</div>
                            <div class="card-title">总订单数</div>
                            <div class="card-value">{{ stats.total_orders || 0 }}</div>
                        </div>
                        <div class="card">
                            <div class="card-icon">🎉</div>
                            <div class="card-title">今日订单</div>
                            <div class="card-value">{{ stats.today_orders || 0 }}</div>
                        </div>
                    </div>
                    <div class="welcome-section">
                        <h2 class="welcome-title">欢迎使用亿拓宝管理后台</h2>
                        <p class="welcome-subtitle">当前版本：v1.0.0</p>
                    </div>
                </div>
            </div>
        `,
        setup() {
            const user = ref(store.user);
            const stats = ref({});
            
            const userAvatar = computed(() => {
                if (user.value?.name) {
                    return user.value.name.charAt(0).toUpperCase();
                }
                return '?';
            });
            
            const loadData = async () => {
                try {
                    const res = await api.getDashboard();
                    if (res.data.code === 0) {
                        stats.value = res.data.data;
                    }
                } catch (e) {
                    console.error('加载数据失败', e);
                }
            };
            
            const handleLogout = async () => {
                try {
                    await api.logout();
                } catch (e) {}
                store.clear();
                window.location.reload();
            };
            
            onMounted(() => {
                loadData();
            });
            
            return { user, stats, userAvatar, handleLogout };
        }
    };
    
    // App
    const App = {
        setup() {
            const isLoggedIn = ref(!!store.token);
            
            return { isLoggedIn };
        },
        template: `
            <Login v-if="!isLoggedIn"></Login>
            <Dashboard v-else></Dashboard>
        `
    };
    
    createApp(App).component('Login', Login).component('Dashboard', Dashboard).mount('#app');
    </script>
</body>
</html>
